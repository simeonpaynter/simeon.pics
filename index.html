<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Feed</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --border-color: #dbdbdb;
            --text-color: #262626;
            --text-muted: #8e8e8e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
            padding: 15px 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .feed-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .post-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 45px;
            overflow: hidden;
        }

        .post-header {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
        }

        .post-location {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            background-color: #f0f0f0;
        }

        /* Fallback uniform display while honoring ratio box styles */
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .post-body {
            padding: 16px;
        }

        .post-caption {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .post-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>Journal</h1>
    </header>

    <main class="feed-container" id="photo-feed">
        <!-- Live content is populated dynamically here -->
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const feedContainer = document.getElementById("photo-feed");

            // Format calendar strings into cleaner viewing layouts
            function formatDisplayDate(dateString) {
                const options = { year: 'numeric', month: 'LONG', day: 'numeric' };
                const date = new Date(dateString + 'T00:00:00');
                return date.toLocaleDateString('en-US', options);
            }

            // Fetch structural headless content JSON layout
            fetch("photos_config.json")
                .then(response => {
                    if (!response.ok) throw new Error("Network issue reading photos_config.json");
                    return response.json();
                })
                .then(photos => {
                    if (photos.length === 0) {
                        feedContainer.innerHTML = '<div class="error-message">No photos published yet.</div>';
                        return;
                    }

                    // Loop over entries to generate clean visual layout blocks
                    photos.forEach(photo => {
                        const postElement = document.createElement("article");
                        postElement.className = "post-card";

                        // Handle aspect configurations elegantly via CSS calculations
                        let paddingBottom = "100%"; // default 1:1 square
                        if (photo.aspect_ratio === "4:5") paddingBottom = "125%";
                        if (photo.aspect_ratio === "16:9") paddingBottom = "56.25%";

                        let locationHTML = photo.location ? `<span class="post-location">${photo.location}</span>` : '';

                        postElement.innerHTML = `
                            <div class="post-header">
                                ${locationHTML}
                            </div>
                            <div class="image-wrapper" style="padding-bottom: ${paddingBottom}; height: 0;">
                                <img src="${photo.image_path}" 
                                     alt="${photo.alt_text}" 
                                     loading="lazy" 
                                     style="position: absolute; top: 0; left: 0;">
                            </div>
                            <div class="post-body">
                                <p class="post-caption">${photo.caption}</p>
                                <div class="post-date">${formatDisplayDate(photo.date_published)}</div>
                            </div>
                        `;
                        feedContainer.appendChild(postElement);
                    });
                })
                .catch(error => {
                    console.error("Error loading image configuration layer:", error);
                    feedContainer.innerHTML = '<div class="error-message">Unable to load feed content at this time.</div>';
                });
        });
    </script>
</body>
</html>

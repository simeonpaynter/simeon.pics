<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simeon.pics | Raw Link Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #f0f0f0; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-card { background: #222; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .gallery-card img { width: 100%; height: 240px; object-fit: cover; display: block; background: #333; }
        .gallery-info { padding: 15px; }
    </style>
</head>
<body>

    <h1>📷 Simeon.pics Portfolio</h1>
    <div id="gallery-container" class="gallery-grid"></div>

    <script>
        const STATIC_PHOTOS = [
            {
                Title: "a mom and her fawn",
                Caption: "sunrise with deer",
                ImageURL: "https://drive.google.com/file/d/1oYXTGryFK6UG5JhkHUfT83d9yPzS4dW7/view?usp=sharing",
                Date: "2026-05-15"
            },
            {
                Title: "fun times",
                Caption: "friday night in the cities",
                ImageURL: "https://drive.google.com/file/d/1ClQvQpnqFn9IjUQizBvQjKS4hBLSa0WS/view?usp=sharing",
                Date: "2024-04-23"
            }
        ];

        function renderUserInterface(items) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = ''; 

            items.forEach(item => {
                // EXPLANATION: To make your raw links render as an actual image, 
                // swap out the variable below from 'item.ImageURL' to 'convertLink(item.ImageURL)'
                const finalImgSrc = item.ImageURL; 

                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <img src="${finalImgSrc}" alt="${item.Title}">
                    <div class="gallery-info">
                        <h3>${item.Title}</h3>
                        <p>${item.Caption}</p>
                        <small>${item.Date}</small>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Quick conversion block to change web previews into graphics streams
        function convertLink(url) {
            const id = url.split('/d/')[1].split('/')[0];
            return `https://google.com{id}`;
        }

        renderUserInterface(STATIC_PHOTOS);
    </script>
</body>
</html>

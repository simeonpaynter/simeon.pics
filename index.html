<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simeon.pics | Streamlined Gallery POC</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #f0f0f0; }
        .status-box { background: #2a2a2a; border-left: 4px solid #00ffcc; padding: 15px; margin-bottom: 20px; font-size: 0.9rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-card { background: #222; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .gallery-card img { width: 100%; height: 240px; object-fit: cover; display: block; background: #333; }
        .gallery-info { padding: 15px; }
        .gallery-info h3 { margin: 0 0 5px 0; color: #fff; }
        .gallery-info p { margin: 0; color: #aaa; font-size: 0.85rem; }
    </style>
</head>
<body>

    <h1>📷 Simeon.pics Platform Engine</h1>
    
    <!-- System Diagnostics Output Box -->
    <div id="system-status" class="status-box">System Status: Initializing diagnostic checks...</div>

    <!-- UI Target Container -->
    <div id="gallery-container" class="gallery-grid"></div>

    <script>
        // ==========================================
        // 1. SYSTEM CONFIGURATION LAYER
        // ==========================================
        const SHEET_ID = '18TPquPHybZZm4PqsRZh6vSnqfZ-C9luC7Grt0SVGoJg'; 
        const TAB_NAME = 'PhotoGallery';
        
        // This is the clean, uncontradicted path using standard JavaScript string templates
        const CSV_URL = `https://google.com{SHEET_ID}/export?format=csv&sheet=${TAB_NAME}`;

        // Update diagnostic UI text block helper
        function updateStatus(message, isError = false) {
            const statusBox = document.getElementById('system-status');
            statusBox.innerText = `Log: ${message}`;
            if (isError) {
                statusBox.style.borderLeftColor = '#ff4a4a';
                statusBox.style.color = '#ff9999';
            }
        }

        // ==========================================
        // 2. DATA PROCESSING LAYER
        // ==========================================
        
        // Converts user-pasted Google Drive share links into direct image endpoints
        function convertDriveLinkToImage(rawUrl) {
            if (!rawUrl) return '';
            const driveIdRegex = /\/d\/([a-zA-Z0-9-_]+)/;
            const match = rawUrl.match(driveIdRegex);
            return match ? `https://googleusercontent.com{match[1]}` : rawUrl;
        }

        // Clean, easily debugged text splitter function
        function parseSimpleCSV(rawText) {
            // Step A: Break string down into individual text rows
            const lines = rawText.split('\n');
            
            // Step B: Grab headers from row 0 and clean up quote marks
            const headers = lines[0].split(',').map(h => h.replace(/["\r]/g, '').trim());
            console.log("Parsed System Headers:", headers);

            // Step C: Map trailing data rows directly to headers
            return lines.slice(1).map((line, rowIndex) => {
                const cells = line.split(',').map(c => c.replace(/["\r]/g, '').trim());
                
                // Construct JavaScript Object array
                let rowObject = {};
                headers.forEach((header, index) => {
                    rowObject[header] = cells[index] || '';
                });
                return rowObject;
            });
        }

        // ==========================================
        // 3. NETWORK EXECUTION ENGINE
        // ==========================================
        async function runPipeline() {
            try {
                updateStatus(`Attempting network link connection: ${CSV_URL}`);
                
                const response = await fetch(CSV_URL);
                
                if (!response.ok) {
                    throw new Error(`Google Cloud Rejected Request (Status ${response.status})`);
                }

                const rawText = await response.text();
                updateStatus("Data packet pulled. Processing layout streams...");

                const dataRows = parseSimpleCSV(rawText);
                renderUserInterface(dataRows);

            } catch (error) {
                console.error("Execution Interrupted:", error);
                updateStatus(`${error.message} - Double check file share permissions or URL formatting tokens.`, true);
            }
        }

        // ==========================================
        // 4. INTERFACE VIEW RENDERING LAYER
        // ==========================================
        function renderUserInterface(items) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = ''; 
            
            let validFramesCount = 0;

            items.forEach(item => {
                // Ensure column name matches your sheet exactly
                if (!item.ImageURL) return; 

                validFramesCount++;
                const directImgSrc = convertDriveLinkToImage(item.ImageURL);

                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <img src="${directImgSrc}" alt="${item.Title || 'Visual Frame'}" loading="lazy">
                    <div class="gallery-info">
                        <h3>${item.Title || 'Untitled Engine Asset'}</h3>
                        <p>${item.Caption || 'No telemetry log details description added.'}</p>
                    </div>
                `;
                container.appendChild(card);
            });

            updateStatus(`Success. Fully loaded ${validFramesCount} pipeline display frames onto canvas layer.`);
        }

        // Fire up data acquisition engine on page initialization
        runPipeline();
    </script>
</body>
</html>
